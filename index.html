<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="kagaku.ico" type="image/x-icon">

        :root {

            --success-color: #2ec4b6;

            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px;
            width: 100%;
            max-width: 550px;
            text-align: center;
            box-sizing: border-box;
        }

        h1 {
            font-size: 24px;
            color: var(--primary-color);
            margin-top: 0;
            margin-bottom: 20px;
        }

        .menu-group, .quiz-group {
            display: none;
        }

        .active {
            display: block;
        }

        .setting-section {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .setting-section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 15px;
            color: #555;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox-label input {
            margin-right: 6px;
        }

        .special-box {
            grid-column: span 2;
            background: #fff0f0;
            border: 1px dashed var(--danger-color);
            padding: 6px;
            border-radius: 6px;
            font-weight: bold;
            color: #c01127;
        }

        .select-input {
            width: 100%;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
            box-sizing: border-box;
        }

        .btn {
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            width: 100%;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        .btn:hover {
            filter: brightness(0.9);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .mode-btn {
            background-color: #6c757d;
        }

        .exam-btn {
            background-color: var(--exam-color);
        }

        .quiz-status {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .timer-badge {
            font-weight: bold;
            color: var(--danger-color);
            background: #ffe3e3;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .question-box {
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 30px 10px;
            margin-bottom: 25px;
        }

        .question-text {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }

        .question-target {
            font-size: 36px;
            font-weight: bold;
            color: #222;
        }

        .chemical-formula {
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 1px;
        }

        .choice-btn {
            background-color: white;
            color: var(--text-color);
            border: 2px solid #e9ecef;
            font-size: 18px;
            font-weight: 500;
        }

        .choice-btn:hover {
            background-color: #f8f9fa;
            border-color: var(--primary-color);
        }

        .choice-btn.correct {
            background-color: var(--success-color) !important;
            color: white !important;
            border-color: var(--success-color) !important;
        }

        .choice-btn.incorrect {
            background-color: var(--danger-color) !important;
            color: white !important;
            border-color: var(--danger-color) !important;
        }

        .result-score {
            font-size: 22px;
            font-weight: bold;
            margin: 20px 0;
        }

        .section-title {
            font-size: 14px;
            font-weight: bold;
            color: #444;
            margin: 15px 0 8px 0;
            text-align: left;
            border-left: 4px solid var(--primary-color);
            padding-left: 8px;
        }
        .exam-border {
            border-left-color: var(--exam-color);
        }

        /* 復習セクションのスタイル */
        .review-section {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            text-align: left;
            max-height: 250px;
            overflow-y: auto;
        }

        .review-title {
            font-size: 15px;
            font-weight: bold;
            color: #555;
            margin-top: 0;
            margin-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 5px;
        }

        .review-item {
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #e9ecef;
        }

        .review-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .review-q {
            font-weight: bold;
            color: #333;
        }

        .review-ans {
            margin-top: 3px;
        }

        .text-wrong {
            color: var(--danger-color);
            font-weight: bold;
        }

        .text-correct {
            color: var(--success-color);
            font-weight: bold;
        }
    </style>
</head>

<div class="container">
    <h1>🧪 化学・元素マスタークイズ Pro+</h1>

    <div id="menu-screen" class="menu-group active">
        <p style="color: #666; margin-bottom: 20px;">条件を設定してモードを選んでください（全10問）</p>
        
        <div class="setting-section">
            <h3>📅 出題範囲の選択（元素クイズ用）</h3>
            <div class="checkbox-grid">

                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="1" checked>第1周期 (1-2)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="2" checked>第2周期 (3-10)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="3" checked>第3周期 (11-18)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="4" checked>第4周期 (19-36)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="5" checked>第5周期 (37-54)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="6" checked>第6周期 (55-86)</label>
                <label class="checkbox-label"><input type="checkbox" class="period-checkbox" value="7" checked>第7周期 (87-118)</label>
            </div>
        </div>

        <div class="setting-section">
            <h3>⏱️ タイムアタック設定（1問あたり）</h3>
            <select id="timer-setting" class="select-input">
                <option value="0">制限時間なし（じっくり）</option>
                <option value="15">15秒（標準）</option>
                <option value="10">10秒（やや難）</option>
                <option value="5">5秒（激ムズ）</option>
                <option value="3">3秒（神の領域）</option>
            </select>
        </div>

        <div class="section-title">ベーシック元素クイズ</div>
        <button class="btn mode-btn" onclick="preStartQuiz('symbol')">🔠 元素記号をあてるモード</button>
        <button class="btn mode-btn" onclick="preStartQuiz('name')">🗣️ 元素名をあてるモード</button>

        <div class="section-title exam-border">🎓 大学受験レベル 化学式クイズ</div>
        <button class="btn exam-btn" onclick="preStartQuiz('formula')">📝 化学式をあてるモード</button>
        <button class="btn exam-btn" onclick="preStartQuiz('chemicalName')">🏷️ 物質名をあてるモード</button>
    </div>

    <div id="quiz-screen" class="quiz-group">
        <div class="quiz-status">
            <span id="progress-text">第 1 / 10 問</span>
            <span id="timer-display" class="timer-badge" style="display: none;">⏱️ -- 秒</span>
            <span id="score-text">スコア: 0</span>
        </div>
        
        <div class="question-box">
            <div id="question-hint" class="question-text">この物質の化学式は？</div>
            <div id="question-display" class="question-target">H₂O</div>
        </div>

        <div id="choices-container">
            <button class="btn choice-btn" onclick="selectAnswer(0)">選択肢 1</button>
            <button class="btn choice-btn" onclick="selectAnswer(1)">選択肢 2</button>
            <button class="btn choice-btn" onclick="selectAnswer(2)">選択肢 3</button>
            <button class="btn choice-btn" onclick="selectAnswer(3)">選択肢 4</button>
        </div>
    </div>

    <div id="result-screen" class="quiz-group">
        <h2>🎉 クイズ修了！</h2>
        <div id="final-score" class="result-score">10問中 0問正解</div>
        <p id="result-comment"></p>

        <div class="review-section">
            <div class="review-title">🔍 今回間違えた問題の復習</div>
            <div id="review-list"></div>
        </div>

        <button class="btn" style="background-color: var(--primary-color);" onclick="backToMenu()">メニューに戻る</button>
    </div>
</div>

    { formula: "C3H8", name: "プロパン", trapGroup: "alkane" },
    { formula: "C2H4", name: "エチレン", trapGroup: "alkene" },
    { formula: "C2H2", name: "アセチレン", trapGroup: "alkyne" },
    { formula: "CH3OH", name: "メタノール", trapGroup: "alcohol" },
    { formula: "C2H5OH", name: "エタノール", trapGroup: "alcohol" },
    { formula: "CH3OCH3", name: "ジメチルエーテル", trapGroup: "ether" },
    { formula: "C2H5OC2H5", name: "ジエチルエーテル", trapGroup: "ether" },
    { formula: "HCHO", name: "ホルムアルデヒド", trapGroup: "aldehyde" },
    { formula: "CH3CHO", name: "アセトアルデヒド", trapGroup: "aldehyde" },
    { formula: "CH3COCH3", name: "アセトン", trapGroup: "ketone" },
    { formula: "HCOOH", name: "ギ酸", trapGroup: "carboxylic" },
    { formula: "CH3COOH", name: "酢酸", trapGroup: "carboxylic" },
    { formula: "CH3COOC2H5", name: "酢酸エチル", trapGroup: "ester" },
    { formula: "C6H6", name: "ベンゼン", trapGroup: "aromatic" },
    { formula: "C6H5OH", name: "フェノール", trapGroup: "aromatic" },
    { formula: "C6H5CH3", name: "トルエン", trapGroup: "aromatic" },
    { formula: "C6H5COOH", name: "安息香酸", trapGroup: "aromatic" },
    { formula: "C6H5NH2", name: "アニリン", trapGroup: "aromatic-n" },
    { formula: "C6H5NO2", name: "ニトロベンゼン", trapGroup: "aromatic-n" },
    { formula: "C6H12O6", name: "グルコース（ブドウ糖）", trapGroup: "sugar" },
    { formula: "C12H22O11", name: "スクロース（ショ糖）", trapGroup: "sugar" }
];

let currentMode = ''; 
let quizQuestions = [];
let currentQuestionIndex = 0;
let score = 0;
let isAnswered = false;
let isTrapMode = false;

let timeLimitPerQuestion = 0; 
let currentRemainingTime = 0;
let timerIntervalId = null;

let wrongQuestionsLog = []; // 間違えた問題を保存する配列

function togglePeriodCheckboxes(trapCheckbox) {
    const checkboxes = document.querySelectorAll('.period-checkbox');
    checkboxes.forEach(cb => {
        cb.disabled = trapCheckbox.checked;
        if (trapCheckbox.checked) {
            cb.checked = false;
        }
    });
}

function formatFormula(formula) {
    return formula.replace(/([A-Za-z\)]+)(\d+)/g, function(match, p1, p2) {
        return p1 + p2.split('').map(num => `<sub>${num}</sub>`).join('');
    });
}

function preStartQuiz(mode) {
    const trapCheckbox = document.getElementById('trap-only-checkbox');
    isTrapMode = trapCheckbox.checked;
    
    let filteredData = [];

    if (mode === 'formula' || mode === 'chemicalName') {
        filteredData = [...chemicalData];
    } 
    else {
        if (isTrapMode) {
            filteredData = elementsData.filter(el => el.trapGroup !== undefined);
        } else {
            const checkboxes = document.querySelectorAll('.period-checkbox:checked');
            const selectedPeriods = Array.from(checkboxes).map(cb => parseInt(cb.value));

            if (selectedPeriods.length === 0) {
                alert('少なくとも1つの周期、または特訓モードを選択してください！');
                return;
            }
            filteredData = elementsData.filter(el => selectedPeriods.includes(el.period));
        }
    }

    const timerSetting = parseInt(document.getElementById('timer-setting').value);
    timeLimitPerQuestion = timerSetting;

    const totalQuestionsCount = Math.min(filteredData.length, 10);
    const shuffled = [...filteredData].sort(() => 0.5 - Math.random());
    quizQuestions = shuffled.slice(0, totalQuestionsCount);

    startQuiz(mode);
}

function startQuiz(mode) {
    currentMode = mode;
    score = 0;
    currentQuestionIndex = 0;
    isAnswered = false;
    wrongQuestionsLog = []; // ログを初期化

    document.getElementById('menu-screen').classList.remove('active');
    document.getElementById('quiz-screen').classList.add('active');
    
    const timerDisplay = document.getElementById('timer-display');
    if (timeLimitPerQuestion > 0) {
        timerDisplay.style.display = 'inline-block';
    } else {
        timerDisplay.style.display = 'none';
    }

    showQuestion();
}

function showQuestion() {
    if (timerIntervalId) clearInterval(timerIntervalId);
    isAnswered = false;
    const currentQuestion = quizQuestions[currentQuestionIndex];
    const displayTarget = document.getElementById('question-display');
    
    document.getElementById('progress-text').innerText = `第 ${currentQuestionIndex + 1} / ${quizQuestions.length} 問`;
    document.getElementById('score-text').innerText = `スコア: ${score}`;

    displayTarget.classList.remove('chemical-formula');

    if (currentMode === 'symbol') {
        document.getElementById('question-hint').innerText = `次の元素の元素記号は？`;
        displayTarget.innerText = currentQuestion.name;
    } else if (currentMode === 'name') {
        document.getElementById('question-hint').innerText = `元素記号「 ${currentQuestion.symbol} 」の元素名はどれ？`;
        displayTarget.innerText = currentQuestion.symbol;
    } else if (currentMode === 'formula') {
        document.getElementById('question-hint').innerText = `「 ${currentQuestion.name} 」の化学式はどれ？`;
        displayTarget.innerText = currentQuestion.name;
    } else if (currentMode === 'chemicalName') {
        document.getElementById('question-hint').innerText = `この化学式が表す物質名はどれ？`;
        displayTarget.innerHTML = formatFormula(currentQuestion.formula);
        displayTarget.classList.add('chemical-formula');
    }

    let choices = [currentQuestion];
    const dataSource = (currentMode === 'formula' || currentMode === 'chemicalName') ? chemicalData : elementsData;
    const keyIdentifier = (currentMode === 'formula' || currentMode === 'chemicalName') ? 'formula' : 'num';
    
    if (currentQuestion.trapGroup) {
        const sameGroup = dataSource.filter(item => item.trapGroup === currentQuestion.trapGroup && item[keyIdentifier] !== currentQuestion[keyIdentifier]);
        sameGroup.sort(() => 0.5 - Math.random());
        for (let item of sameGroup) {
            if (choices.length < 4) choices.push(item);
        }
    }

    while (choices.length < 4) {
        const randomItem = dataSource[Math.floor(Math.random() * dataSource.length)];
        if (!choices.some(e => e[keyIdentifier] === randomItem[keyIdentifier])) {
            choices.push(randomItem);
        }
    }
    choices.sort(() => 0.5 - Math.random());

    const buttons = document.querySelectorAll('.choice-btn');
    buttons.forEach((btn, index) => {
        btn.className = 'btn choice-btn';
        
        if (currentMode === 'symbol') {
            btn.innerText = choices[index].symbol;
            btn.dataset.isCorrect = (choices[index].symbol === currentQuestion.symbol);
            btn.dataset.choiceDisplay = choices[index].symbol;
        } else if (currentMode === 'name') {
            btn.innerText = choices[index].name;
            btn.dataset.isCorrect = (choices[index].name === currentQuestion.name);
            btn.dataset.choiceDisplay = choices[index].name;
        } else if (currentMode === 'formula') {
            btn.innerHTML = formatFormula(choices[index].formula);
            btn.dataset.isCorrect = (choices[index].formula === currentQuestion.formula);
            btn.dataset.choiceDisplay = formatFormula(choices[index].formula); // 復習用HTML
        } else if (currentMode === 'chemicalName') {
            btn.innerText = choices[index].name;
            btn.dataset.isCorrect = (choices[index].name === currentQuestion.name);
            btn.dataset.choiceDisplay = choices[index].name;
        }
    });

    if (timeLimitPerQuestion > 0) {
        currentRemainingTime = timeLimitPerQuestion;
        updateTimerDisplay();
        timerIntervalId = setInterval(() => {
            currentRemainingTime--;
            updateTimerDisplay();
            if (currentRemainingTime <= 0) {
                clearInterval(timerIntervalId);
                handleTimeOut();
            }
        }, 1000);
    }
}

function updateTimerDisplay() {
    document.getElementById('timer-display').innerText = `⏱️ ${currentRemainingTime} 秒`;
}

function handleTimeOut() {
    if (isAnswered) return;
    isAnswered = true;
    
    const currentQuestion = quizQuestions[currentQuestionIndex];
    let qText = '', cText = '';

    // 復習表示用に整理
    if (currentMode === 'symbol') { qText = currentQuestion.name; cText = currentQuestion.symbol; }
    else if (currentMode === 'name') { qText = currentQuestion.symbol; cText = currentQuestion.name; }
    else if (currentMode === 'formula') { qText = currentQuestion.name; cText = formatFormula(currentQuestion.formula); }
    else if (currentMode === 'chemicalName') { qText = formatFormula(currentQuestion.formula); cText = currentQuestion.name; }

    wrongQuestionsLog.push({ question: qText, yourAnswer: "時間切れ", correctAnswer: cText });

    const buttons = document.querySelectorAll('.choice-btn');
    buttons.forEach(btn => {
        if (btn.dataset.isCorrect === 'true') {
            btn.classList.add('correct');
        } else {
            btn.classList.add('incorrect');
        }
    });
    goToNextQuestion();
}

function selectAnswer(index) {
    if (isAnswered) return; 
    isAnswered = true;
    if (timerIntervalId) clearInterval(timerIntervalId);

    const buttons = document.querySelectorAll('.choice-btn');
    const selectedButton = buttons[index];
    const isCorrect = selectedButton.dataset.isCorrect === 'true';
    const currentQuestion = quizQuestions[currentQuestionIndex];

    let qText = '', cText = '';
    if (currentMode === 'symbol') { qText = currentQuestion.name; cText = currentQuestion.symbol; }
    else if (currentMode === 'name') { qText = currentQuestion.symbol; cText = currentQuestion.name; }
    else if (currentMode === 'formula') { qText = currentQuestion.name; cText = formatFormula(currentQuestion.formula); }
    else if (currentMode === 'chemicalName') { qText = formatFormula(currentQuestion.formula); cText = currentQuestion.name; }

    if (isCorrect) {
        selectedButton.classList.add('correct');
        score++;
    } else {
        selectedButton.classList.add('incorrect');
        buttons.forEach(btn => {
            if (btn.dataset.isCorrect === 'true') {
                btn.classList.add('correct');
            }
        });
        
        // ログに保存
        wrongQuestionsLog.push({
            question: qText,
            yourAnswer: selectedButton.dataset.choiceDisplay,
            correctAnswer: cText
        });
    }
    goToNextQuestion();
}

function goToNextQuestion() {
    setTimeout(() => {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizQuestions.length) {
            showQuestion();
        } else {
            showResult();
        }
    }, 1200);
}

function showResult() {
    if (timerIntervalId) clearInterval(timerIntervalId);
    document.getElementById('quiz-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');

    document.getElementById('final-score').innerText = `${quizQuestions.length}問中 ${score} 問正解！`;

    let comment = '';
    const rate = score / quizQuestions.length;
    if (rate === 1) comment = '👑 素晴らしい！';
    else if (rate >= 0.8) comment = '✨ その調子！';
    else if (rate >= 0.5) comment = '👍 ケアレスミスに注意！';
    else comment = '📚 もう少し復習しましょう！';

    document.getElementById('result-comment').innerText = comment;

    // 復習リストの表示生成
    const reviewListContainer = document.getElementById('review-list');
    reviewListContainer.innerHTML = ''; 

    if (wrongQuestionsLog.length === 0) {
        reviewListContainer.innerHTML = '<p style="color: var(--success-color); font-weight: bold; margin:0;">🎉 全問正解です！</p>';
    } else {
        wrongQuestionsLog.forEach(item => {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'review-item';
            itemDiv.innerHTML = `
                <div class="review-q">問題： ${item.question}</div>
                <div class="review-ans">
                    あなたの解答： <span class="text-wrong">${item.yourAnswer}</span> 
                    / 正解： <span class="text-correct">${item.correctAnswer}</span>
                </div>
            `;
            reviewListContainer.appendChild(itemDiv);
        });
    }
}

function backToMenu() {
    const trapCheckbox = document.getElementById('trap-only-checkbox');
    if (trapCheckbox) {
        trapCheckbox.checked = false;
        togglePeriodCheckboxes(trapCheckbox);
    }
    
    const checkboxes = document.querySelectorAll('.period-checkbox');
    checkboxes.forEach(cb => {
        cb.checked = true;
    });

    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('menu-screen').classList.add('active');
}
</script>
